name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=windows GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dockyard-windows-amd64.exe .
          GOOS=darwin  GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dockyard-mac-amd64 .
          GOOS=darwin  GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o dockyard-mac-arm64 .
          GOOS=linux   GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o dockyard-linux-amd64 .

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            dockyard-windows-amd64.exe \
            dockyard-mac-amd64 \
            dockyard-mac-arm64 \
            dockyard-linux-amd64
